<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎉 Guest List Manager</title>

  <!-- Libraries -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container my-5 p-4 rounded shadow-lg bg-gradient">
    <h1 class="text-center text-primary animate__animated animate__fadeInDown">🎉 Guest List Manager</h1>

    <!-- Add Guest Form -->
    <form action="{{ url_for('add_guest') }}" method="POST" class="d-flex gap-2 mb-4 flex-wrap justify-content-center">
      <input type="text" name="name" class="form-control w-50" placeholder="Enter guest name" required />
      <button type="submit" class="btn btn-success">
        <i class="fas fa-user-plus"></i> Add Guest
      </button>
    </form>

    <!-- Search + Filter -->
    <div class="d-flex gap-2 mb-4 flex-wrap">
      <input type="text" id="searchInput" class="form-control" placeholder="🔍 Search guest by name..." />
      <select id="statusFilter" class="form-select w-auto">
        <option value="">All Status</option>
        <option value="pending">Pending</option>
        <option value="invited">Invited</option>
        <option value="accepted">Accepted</option>
        <option value="declined">Declined</option>
      </select>
    </div>

    <!-- Guest Table -->
    <table class="table table-bordered table-hover text-center">
      <thead class="table-primary">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="guestTable">
        {% for g in guests %}
        <tr data-aos="fade-up">
          <td>{{ g.id }}</td>
          <td class="guest-name">{{ g.name }}</td>
          <td>
            <span class="badge status {{ g.status }}">{{ g.status.capitalize() }}</span>
          </td>
          <td>
            <a class="btn invite-btn" href="{{ url_for('update_guest', guest_id=g.id, status='invited') }}">
              <i class="fas fa-envelope"></i>
            </a>
            <a class="btn accept-btn" href="{{ url_for('update_guest', guest_id=g.id, status='accepted') }}">
              <i class="fas fa-check"></i>
            </a>
            <a class="btn decline-btn" href="{{ url_for('update_guest', guest_id=g.id, status='declined') }}">
              <i class="fas fa-times"></i>
            </a>
            <a class="btn delete-btn" href="{{ url_for('delete_guest', guest_id=g.id) }}">
              <i class="fas fa-trash"></i>
            </a>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="4">✨ No guests yet. Add someone!</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
  <script>AOS.init();</script>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
